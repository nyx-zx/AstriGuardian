<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EARTHGUARDIAN LIVE v7 — Panamá</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* ---------------------------------------------------------
   GLOBAL
--------------------------------------------------------- */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b0b0c;
    color: #fff;
}

header {
    padding: 18px;
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

/* ---------------------------------------------------------
   SELECT
--------------------------------------------------------- */
select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 12px;
    background: #fff;
    color: #000;
    border: none;
    margin-bottom: 20px;
}

/* ---------------------------------------------------------
   GRID
--------------------------------------------------------- */
.grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
}

/* ---------------------------------------------------------
   SQUIRCLE WIDGETS (smaller, gradient, outline, hover)
--------------------------------------------------------- */
.widget {
    width: 100%;
    height: 120px;
    border-radius: 26px;
    background: linear-gradient(to top right, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
    backdrop-filter: blur(20px);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.18),
        0 6px 16px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 12px;
    font-size: 13px;
    position: relative;
    transition: transform .25s ease, box-shadow .25s ease;
}

.widget:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.25),
        0 10px 26px rgba(0,0,0,0.55);
}

/* Color gradients (top-right) */
.widget.temp     { background: linear-gradient(to top right, #ff6b6b33, #ff6b6b11); }
.widget.humidity { background: linear-gradient(to top right, #4da6ff33, #4da6ff11); }
.widget.rain     { background: linear-gradient(to top right, #7a5cff33, #7a5cff11); }
.widget.wind     { background: linear-gradient(to top right, #33cc3333, #33cc3311); }
.widget.uv       { background: linear-gradient(to top right, #ffcc0033, #ffcc0011); }
.widget.air      { background: linear-gradient(to top right, #cccccc33, #cccccc11); }
.widget.pressure { background: linear-gradient(to top right, #ffaa3333, #ffaa3311); }
.widget.forecast { background: linear-gradient(to top right, #00f2fe33, #00f2fe11); }

/* ---------------------------------------------------------
   LIQUID ANIMATION BAR
--------------------------------------------------------- */
.liquid-bar {
    width: 80%;
    height: 16px;
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    overflow: hidden;
    margin-top: 8px;
    position: relative;
}

.liquid-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    border-radius: 12px;
    animation: liquidWave 2s infinite ease-in-out;
}

@keyframes liquidWave {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
    100% { filter: brightness(1); }
}

.liquid-value {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-weight: 600;
    pointer-events: none;
}

/* ---------------------------------------------------------
   RISK BLOCKS
--------------------------------------------------------- */
.risk {
    padding: 14px;
    border-radius: 18px;
    font-size: 14px;
    text-align: center;
    backdrop-filter: blur(20px);
    font-weight: 600;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.15),
        0 8px 20px rgba(0,0,0,0.4);
}

.low { background: rgba(46, 204, 113, 0.25); }
.moderate { background: rgba(230, 195, 0, 0.25); }
.high { background: rgba(230, 126, 34, 0.25); }
.critical { background: rgba(231, 76, 60, 0.25); }

/* ---------------------------------------------------------
   RECOMMENDATIONS
--------------------------------------------------------- */
#recommendations {
    margin-top: 20px;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    font-size: 15px;
    backdrop-filter: blur(20px);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.15),
        0 8px 20px rgba(0,0,0,0.4);
}

/* ---------------------------------------------------------
   CHART + MAP SIDE BY SIDE
--------------------------------------------------------- */
#chart-map-wrapper {
    display: grid;
    grid-template-columns: 0.8fr 1.2fr;
    gap: 20px;
    margin-top: 20px;
}

#chart {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 18px;
    height: 300px !important;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.15),
        0 8px 20px rgba(0,0,0,0.4);
}

#map {
    height: 300px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.15),
        0 8px 20px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<header>EARTHGUARDIAN LIVE — Panamá</header>

<div class="container">

    <select id="province-select">
        <option value="Panama">Panamá</option>
        <option value="Panama Oeste">Panamá Oeste</option>
        <option value="Colon">Colón</option>
        <option value="Chiriqui">Chiriquí</option>
        <option value="Veraguas">Veraguas</option>
        <option value="Cocle">Coclé</option>
        <option value="Herrera">Herrera</option>
        <option value="Los Santos">Los Santos</option>
        <option value="Darien">Darién</option>
        <option value="Bocas del Toro">Bocas del Toro</option>
    </select>

    <!-- SQUIRCLE WIDGETS -->
    <div class="grid-4">
        <div class="widget temp" id="temp-card"></div>
        <div class="widget humidity" id="humidity-card"></div>
        <div class="widget rain" id="rain-card"></div>
        <div class="widget wind" id="wind-card"></div>
        <div class="widget uv" id="uv-card"></div>
        <div class="widget air" id="air-card"></div>
        <div class="widget pressure" id="pressure-card"></div>
        <div class="widget forecast" id="forecast-card"></div>
    </div>

    <!-- RISK BLOCKS -->
    <div class="grid-4" id="risk-container"></div>

    <!-- RECOMMENDATIONS -->
    <div id="recommendations"></div>

    <!-- CHART + MAP SIDE BY SIDE -->
    <div id="chart-map-wrapper">
        <canvas id="chart"></canvas>
        <div id="map"></div>
    </div>

</div>

<script>
const coords = {
    "Panama": { lat: 9.0, lon: -79.5 },
    "Panama Oeste": { lat: 8.9, lon: -79.8 },
    "Colon": { lat: 9.35, lon: -79.9 },
    "Chiriqui": { lat: 8.4, lon: -82.4 },
    "Veraguas": { lat: 8.1, lon: -80.9 },
    "Cocle": { lat: 8.6, lon: -80.4 },
    "Herrera": { lat: 7.8, lon: -80.3 },
    "Los Santos": { lat: 7.5, lon: -80.4 },
    "Darien": { lat: 8.0, lon: -77.5 },
    "Bocas del Toro": { lat: 9.35, lon: -82.25 }
};

const map = L.map('map').setView([9.0, -79.5], 7);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
let marker = null;
let chart = null;

function widgetHTML(label, percent, valueText) {
    return `
        <h4>${label}</h4>
        <div class="liquid-bar">
            <div class="liquid-fill" style="width:${percent}%;"></div>
            <div class="liquid-value">${valueText}</div>
        </div>
    `;
}

function riskPercent(value, max) {
    return Math.min(100, Math.round((value / max) * 100));
}

async function loadWeather() {
    const province = document.getElementById("province-select").value;
    const { lat, lon } = coords[province];

    const urlWeather = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relativehumidity_2m,precipitation,wind_speed_10m,uv_index,pressure_msl&current_weather=true&timezone=auto`;
    const urlAir = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,sulphur_dioxide,ozone&timezone=auto`;

    const [weatherRes, airRes] = await Promise.all([fetch(urlWeather), fetch(urlAir)]);
    const weather = await weatherRes.json();
    const air = await airRes.json();

    const current = weather.current_weather;
    const hourly = weather.hourly;
    const airHourly = air.hourly;

    const airNow = airHourly.pm2_5[0];

    document.getElementById("temp-card").innerHTML =
        widgetHTML("Temperatura", current.temperature * 2, current.temperature + "°C");

    document.getElementById("humidity-card").innerHTML =
        widgetHTML("Humedad", hourly.relativehumidity_2m[0], hourly.relativehumidity_2m[0] + "%");

    document.getElementById("rain-card").innerHTML =
        widgetHTML("Lluvia", hourly.precipitation[0] * 10, hourly.precipitation[0] + " mm");

    document.getElementById("wind-card").innerHTML =
        widgetHTML("Viento", current.windspeed * 3, current.windspeed + " km/h");

    document.getElementById("uv-card").innerHTML =
        widgetHTML("UV", hourly.uv_index[0] * 10, hourly.uv_index[0]);

    document.getElementById("air-card").innerHTML =
        widgetHTML("PM2.5", airNow * 2, airNow + " µg/m³");

    document.getElementById("pressure-card").innerHTML =
        widgetHTML("Presión", (hourly.pressure_msl[0] - 980), hourly.pressure_msl[0] + " hPa");

    const rainNext = hourly.precipitation.slice(1, 4);
    const willRain = rainNext.some(v => v > 0.5);

    document.getElementById("forecast-card").innerHTML =
        widgetHTML("Predicción", willRain ? 100 : 20, willRain ? "Lluvia pronto" : "Sin lluvia");

    const riskContainer = document.getElementById("risk-container");
    riskContainer.innerHTML = "";

    function risk(level, title, percent) {
        const div = document.createElement("div");
        div.className = `risk ${level}`;
        div.innerHTML = `<strong>${title}: ${percent}%</strong>`;
        riskContainer.appendChild(div);
    }

    const fireRisk = riskPercent(current.temperature + current.windspeed, 100);
    const floodRisk = riskPercent(hourly.precipitation[0], 50);
    const heatRisk = riskPercent(current.temperature + hourly.relativehumidity_2m[0], 120);
    const airRisk = riskPercent(airNow, 100);

    risk(fireRisk > 60 ? "high" : fireRisk > 30 ? "moderate" : "low", "Incendio", fireRisk);
    risk(floodRisk > 60 ? "high" : floodRisk > 30 ? "moderate" : "low", "Inundación", floodRisk);
    risk(heatRisk > 60 ? "high" : heatRisk > 30 ? "moderate" : "low", "Ola de calor", heatRisk);
    risk(airRisk > 60 ? "high" : airRisk > 30 ? "moderate" : "low", "Calidad del aire", airRisk);

    const rec = [];

    if (fireRisk > 60) rec.push("Evita quemas y mantén vigilancia en áreas secas.");
    if (floodRisk > 60) rec.push("Revisa drenajes y evita zonas bajas.");
    if (heatRisk > 60) rec.push("Prende el aire acondicionado y mantente hidratado.");
    if (airRisk > 60) rec.push("Evita actividades al aire libre si tienes alergias.");

    document.getElementById("recommendations").innerHTML =
        rec.length ? rec.join("<br>") : "Condiciones estables.";

    const ctx = document.getElementById("chart").getContext("2d");
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: hourly.time.slice(0, 6),
            datasets: [
                { label: "Temp °C", data: hourly.temperature_2m.slice(0, 6), borderColor: "#ff4d4d", tension: 0.3 },
                { label: "Humedad %", data: hourly.relativehumidity_2m.slice(0, 6), borderColor: "#4da6ff", tension: 0.3 },
                { label: "Lluvia mm", data: hourly.precipitation.slice(0, 6), borderColor: "#7a5cff", tension: 0.3 },
                { label: "Viento km/h", data: hourly.wind_speed_10m.slice(0, 6), borderColor: "#33cc33", tension: 0.3 },
                { label: "UV", data: hourly.uv_index.slice(0, 6), borderColor: "#ffcc00", tension: 0.3 },
                { label: "PM2.5", data: airHourly.pm2_5.slice(0, 6), borderColor: "#cccccc", tension: 0.3 }
            ]
        },
        options: {
            plugins: {
                legend: { labels: { color: "#fff", font: { size: 10 } } }
            },
            scales: {
                x: { ticks: { color: "#ccc", font: { size: 9 } } },
                y: { ticks: { color: "#ccc", font: { size: 9 } } }
            }
        }
    });

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);
    map.setView([lat, lon], 8);
}

document.getElementById("province-select").addEventListener("change", loadWeather);
loadWeather();
</script>

</body>
</html>
